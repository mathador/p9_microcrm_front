name: Release

on:
    push:
        branches: [ semver ]
    workflow_dispatch:
        inputs:
            release_type:
                description: "Type de release (major, minor, patch)"
                required: true
                default: "patch"
                type: choice
                options:
                    - patch
                    - minor
                    - major

jobs:
    release:
        name: Create Release
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Nécessaire pour semantic-release

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: "package-lock.json"

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npx ng test --watch=false --browsers=ChromeHeadless

            - name: Build application
              run: npx @angular/cli build --optimization --configuration production

            - name: Create artifacts
              run: |
                  tar -czf microcrm-front-${{ github.sha }}.tar.gz dist/microcrm/browser/
                  zip -r microcrm-front-${{ github.sha }}.zip dist/microcrm/browser/

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: application-artifacts
                  path: |
                      microcrm-front-${{ github.sha }}.tar.gz
                      microcrm-front-${{ github.sha }}.zip

            - name: Release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: npx semantic-release
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'

            - name: Manual Release
              if: github.event_name == 'workflow_dispatch'
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: v${{ github.event.inputs.release_type }}
                  name: Release ${{ github.event.inputs.release_type }}
                  body: |
                      Release automatique déclenchée manuellement.
                      Type: ${{ github.event.inputs.release_type }}
                  files: |
                      microcrm-front-${{ github.sha }}.tar.gz
                      microcrm-front-${{ github.sha }}.zip
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
