name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job de test et build du frontend Angular
  frontend:
    name: Frontend Angular build + tests + SonarCloud
    runs-on: ubuntu-latest

    steps:
      # Récupération du code source
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configuration de Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Version de Node.js
          cache: "npm" # Mise en cache des dépendances npm
          cache-dependency-path: "package-lock.json"

      # Installation des dépendances npm
      - name: Install frontend dependencies
        run: npm ci # Installation propre (plus rapide que npm install)

      # Exécution des tests unitaires Angular avec couverture
      - name: Run frontend tests and generate coverage
        run: |
          npx ng test --watch=false --browsers=ChromeHeadless --code-coverage
          # --watch=false : pas de surveillance continue
          # --browsers=ChromeHeadless : navigateur headless pour CI
          # --code-coverage : génération des rapports de couverture

      # Upload des rapports de couverture frontend
      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: coverage

      # Build du frontend (dist)
      - name: Build frontend Angular
        run: npx @angular/cli build --optimization

      # Upload de la dist compilée pour utilisation dans le deploy
      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/microcrm/browser
          retention-days: 1 # Garder seulement 1 jour, c'est temporaire

      # Analyse SonarCloud pour le frontend
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=mathador_p9_microcrm_front
            -Dsonar.organization=oc-projet9
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
