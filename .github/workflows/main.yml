name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job de test et build du frontend Angular
  frontend:
    name: Frontend Angular build + tests + SonarCloud
    runs-on: ubuntu-latest

    steps:
      # Récupération du code source
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configuration de Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Version de Node.js
          cache: "npm" # Mise en cache des dépendances npm
          cache-dependency-path: "package-lock.json"

      # Installation des dépendances npm
      - name: Install frontend dependencies
        run: npm ci # Installation propre (plus rapide que npm install)

      # Exécution des tests unitaires Angular avec couverture
      - name: Run frontend tests and generate coverage
        run: |
          npx ng test --watch=false --browsers=ChromeHeadless --code-coverage
          # --watch=false : pas de surveillance continue
          # --browsers=ChromeHeadless : navigateur headless pour CI
          # --code-coverage : génération des rapports de couverture

      # Upload des rapports de couverture frontend
      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: coverage

      # Build du frontend (dist)
      - name: Build frontend Angular
        run: npx @angular/cli build --optimization

      # Upload de la dist compilée pour utilisation dans le deploy
      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/microcrm/browser
          retention-days: 1 # Garder seulement 1 jour, c'est temporaire

      # Analyse SonarCloud pour le frontend
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=mathador_p9_microcrm_front
            -Dsonar.organization=oc-projet9
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  # Étape de déploiement continu (CD) - Construction et publication de l'image Docker frontend
  deploy:
    name: Build and Deploy Frontend Docker Image
    runs-on: ubuntu-latest
    needs: frontend
    # Condition : uniquement sur push vers main, pas sur les pull requests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Téléchargement de la dist frontend compilée
      - name: Download frontend dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist

      # Configuration de Docker Buildx pour le multi-plateforme
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authentification auprès du GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      # Extraction des métadonnées pour le tagging automatique des images
      - name: Extract metadata for Docker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      # Construction et publication de l'image Docker
      - name: Build and push Docker image from pre-compiled artifact
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.deploy
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
